name: Serve-InvenioRDM workflow

on:
  push:
    paths:
      - "Dockerfile"
      - "custom_*.py"
      - "tests/**"
      - ".github/workflows/serve-inveniordm.yml"
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      publish:
        description: 'Publish image to GHCR'
        required: true
        default: false
        type: boolean

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@main

      - name: 'Build test image'
        run: |
          docker build -t ghcr.io/scilifelabdatacentre/serve-inveniordm:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/scilifelabdatacentre/serve-inveniordm:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          timeout: '30m0s'
          exit-code: '0'

      - name: 'Run tests'
        env:
          IMAGE_NAME: ghcr.io/scilifelabdatacentre/serve-inveniordm:latest
        run: |
          pip install -r ./tests/requirements.txt
          python3 -m pytest .

  push:
    if: |
      github.repository == 'scilifelabdatacentre/serve-inveniordm' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/develop' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish == true)
      )
    needs: build_and_test
    runs-on: ubuntu-latest
    concurrency:
      group: '${{ github.workflow }}-${{ github.ref }}'
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: 'Checkout github action'
        uses: actions/checkout@main

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/scilifelabdatacentre/serve-inveniordm
          tags: |
            type=raw,value={{date 'YYMMDD-HHmm' tz='Europe/Stockholm'}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 'Login to GHCR'
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Publish image to GHCR
        uses: docker/build-push-action@v3
        with:
          file: ./Dockerfile
          context: .
          push: true
          build-args: version=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
