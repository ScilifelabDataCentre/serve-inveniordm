name: Serve-InvenioRDM checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "Dockerfile"
      - "Pipfile"
      - "Pipfile.lock"
      - "invenio.cfg"
      - "site/**"
      - "app_data/**"
      - "assets/**"
      - "static/**"
      - "templates/**"
      - "translations/**"
      - "docker/**"
      - ".github/workflows/serve-inveniordm.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@main

      - name: 'Build test image'
        run: |
          docker build -t ghcr.io/scilifelabdatacentre/serve-inveniordm:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/scilifelabdatacentre/serve-inveniordm:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          timeout: '30m0s'
          exit-code: '0'
