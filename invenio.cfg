# === SciLifeLab customizations ===
# =============================================
# Custom DataCite landing page URLs.
# Provider implementation lives in site/serve/custom_datacite_provider.py.
#
# Available URL template placeholders: {id}, {parent_id}, {doi}, {prefix}, {app_code}
# {app_code} is extracted from metadata.identifiers (scilifelab-serve:xxx).

import os
from invenio_rdm_records.services.pids import providers as _rdm_providers
from invenio_rdm_records.resources.serializers.datacite import (
    DataCite43JSONSerializer as _DataCite43JSONSerializer,
)
from invenio_rdm_records import config as _rdm_config
from serve.custom_datacite_provider import (
    CustomDataCitePIDProvider,
    CustomDataCiteClient,
)

DATACITE_LANDING_PAGE_URL_TEMPLATE = os.environ.get(
    "DATACITE_LANDING_PAGE_URL_TEMPLATE",
    "https://serve.scilifelab.se/records/{id}",
)

DATACITE_LANDING_PAGE_URL_TEMPLATE_PARENT = os.environ.get(
    "DATACITE_LANDING_PAGE_URL_TEMPLATE_PARENT",
    "https://serve.scilifelab.se/records/{app_code}",
)


def _make_custom_datacite_provider(serializer=None, label=None, is_parent=False):
    return CustomDataCitePIDProvider(
        "datacite",
        client=CustomDataCiteClient("datacite", config_prefix="DATACITE"),
        serializer=serializer,
        label=label or _("DOI"),
        is_parent_provider=is_parent,
    )


RDM_PERSISTENT_IDENTIFIER_PROVIDERS = [
    _make_custom_datacite_provider(label=_("DOI"), is_parent=False)
    if isinstance(p, _rdm_providers.DataCitePIDProvider)
    else p
    for p in _rdm_config.RDM_PERSISTENT_IDENTIFIER_PROVIDERS
]

RDM_PARENT_PERSISTENT_IDENTIFIER_PROVIDERS = [
    _make_custom_datacite_provider(
        serializer=_DataCite43JSONSerializer(schema_context={"is_parent": True}),
        label=_("Concept DOI"),
        is_parent=True,
    )
    if isinstance(p, _rdm_providers.DataCitePIDProvider)
    else p
    for p in _rdm_config.RDM_PARENT_PERSISTENT_IDENTIFIER_PROVIDERS
]
